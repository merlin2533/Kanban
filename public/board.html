<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <meta name="description" content="Einfaches selbst-gehostetes Kanban Board">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
  <header>
    <a href="/" class="home-link">&#9633;&#9633;&#9633;</a>
    <h1 id="boardTitle"></h1>
    <div class="header-actions">
      <button id="activityBtn" class="icon-btn" title="Aktivität">
        <span class="bell-icon">&#128276;</span>
        <span id="activityBadge" class="badge hidden"></span>
      </button>
    </div>
  </header>

  <main id="board" aria-label="Kanban Board"></main>

  <!-- Card Detail Modal -->
  <div id="modalOverlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalCardText">
    <div class="modal">
      <div class="modal-header">
        <input id="modalCardText" class="modal-title-input" type="text" aria-label="Kartentitel">
        <button id="modalClose" class="icon-btn close-btn" aria-label="Schließen">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Description -->
        <section class="modal-section">
          <h3>Beschreibung</h3>
          <textarea id="modalDescription" class="modal-description" placeholder="Beschreibung hinzufügen..." rows="3" aria-label="Kartenbeschreibung"></textarea>
        </section>

        <!-- Due Date -->
        <section class="modal-section">
          <h3>Fälligkeitsdatum</h3>
          <input type="date" id="modalDueDate" class="modal-due-date" aria-label="Fälligkeitsdatum">
        </section>

        <!-- Labels -->
        <section class="modal-section">
          <h3>Labels</h3>
          <div id="cardLabels" class="card-labels-list"></div>
          <div class="label-picker" id="labelPicker">
            <button id="addLabelBtn" class="add-label-btn">+ Label</button>
            <div id="labelDropdown" class="label-dropdown hidden">
              <div id="boardLabelsList" class="board-labels-list"></div>
              <div class="new-label-row">
                <input id="newLabelName" type="text" placeholder="Neues Label..." maxlength="100" aria-label="Label-Name">
                <input id="newLabelColor" type="color" value="#2563eb" aria-label="Label-Farbe">
                <button id="createLabelBtn">+</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Checklist -->
        <section class="modal-section">
          <h3>Checkliste <span id="checklistProgress"></span></h3>
          <div id="checklistItems"></div>
          <div class="add-row">
            <input id="checklistInput" type="text" placeholder="Neues Item..." aria-label="Neues Checklist-Item">
            <button id="addChecklistBtn">+</button>
          </div>
        </section>

        <!-- Attachments -->
        <section class="modal-section">
          <h3>Dateien &amp; Bilder</h3>
          <div id="attachmentsList"></div>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" multiple hidden>
            <button id="uploadBtn" aria-label="Datei auswählen">Datei hochladen</button>
            <span class="upload-hint">oder hierher ziehen</span>
          </div>
        </section>

        <!-- Comments -->
        <section class="modal-section">
          <h3>Kommentare</h3>
          <div id="commentsList" class="comments-list"></div>
          <div class="add-row">
            <input id="commentInput" type="text" placeholder="Kommentar..." aria-label="Neuer Kommentar">
            <button id="addCommentBtn">Senden</button>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button id="archiveCardBtn" class="archive-btn">Archivieren</button>
        <button id="restoreCardBtn" class="restore-btn" style="display:none;">Wiederherstellen</button>
        <button id="deleteCardBtn" class="danger-btn">Karte löschen</button>
      </div>
    </div>
  </div>

  <!-- Activity Panel -->
  <div id="activityPanel" class="activity-panel hidden" role="complementary" aria-label="Aktivitätsprotokoll">
    <div class="activity-header">
      <h2>Aktivität</h2>
      <button id="closeActivity" class="icon-btn" aria-label="Schließen">&times;</button>
    </div>
    <div id="activityList" class="activity-list"></div>
  </div>

  <!-- Archive Panel -->
  <div id="archivePanel" class="activity-panel hidden" role="complementary" aria-label="Archiv">
    <div class="activity-header">
      <h2>Archiv</h2>
      <button id="closeArchive" class="icon-btn" aria-label="Schließen">&times;</button>
    </div>
    <div id="archivedList" class="activity-list"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
