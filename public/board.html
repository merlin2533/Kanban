<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
</head>
<body>
  <header>
    <a href="/" class="home-link">&#9633;&#9633;&#9633;</a>
    <h1 id="boardTitle"></h1>
    <div class="header-actions">
      <button id="activityBtn" class="icon-btn" title="Aktivität">
        <span class="bell-icon">&#128276;</span>
        <span id="activityBadge" class="badge hidden">0</span>
      </button>
    </div>
  </header>

  <main id="board"></main>

  <!-- Card Detail Modal -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <input id="modalCardText" class="modal-title-input" type="text">
        <button id="modalClose" class="icon-btn close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Checklist -->
        <section class="modal-section">
          <h3>Checkliste <span id="checklistProgress"></span></h3>
          <div id="checklistItems"></div>
          <div class="add-row">
            <input id="checklistInput" type="text" placeholder="Neues Item...">
            <button id="addChecklistBtn">+</button>
          </div>
        </section>

        <!-- Attachments -->
        <section class="modal-section">
          <h3>Dateien &amp; Bilder</h3>
          <div id="attachmentsList"></div>
          <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" multiple hidden>
            <button id="uploadBtn">Datei hochladen</button>
            <span class="upload-hint">oder hierher ziehen</span>
          </div>
        </section>
      </div>
      <div class="modal-footer">
        <button id="deleteCardBtn" class="danger-btn">Karte löschen</button>
      </div>
    </div>
  </div>

  <!-- Activity Panel -->
  <div id="activityPanel" class="activity-panel hidden">
    <div class="activity-header">
      <h2>Aktivität</h2>
      <button id="closeActivity" class="icon-btn">&times;</button>
    </div>
    <div id="activityList" class="activity-list"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
