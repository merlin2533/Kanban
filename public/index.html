<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="/icons/icon-192.png" type="image/png">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <meta name="description" content="Einfaches selbst-gehostetes Kanban Board">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}

    /* Top nav */
    .topnav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topnav-logo {
      font-size: 22px;
      font-weight: 700;
      color: #2563eb;
      text-decoration: none;
    }
    .topnav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-link {
      padding: 6px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: #475569;
      transition: background 0.15s;
    }
    .nav-link:hover { background: #f1f5f9; }
    .nav-link.admin { color: #7c3aed; }
    .nav-link.admin:hover { background: #f5f3ff; }
    .btn-logout {
      padding: 6px 14px;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-logout:hover { background: #fecaca; }

    /* Main content */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 26px;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .page-header p {
      color: #64748b;
      font-size: 14px;
    }

    /* Create bar */
    .create-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .create-bar input {
      flex: 1;
      padding: 10px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .create-bar input:focus { border-color: #2563eb; }
    .create-bar button {
      padding: 10px 22px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .create-bar button:hover { background: #1d4ed8; }
    .create-error {
      display: none;
      color: #dc2626;
      font-size: 13px;
      margin-top: -20px;
      margin-bottom: 20px;
    }

    /* Board grid */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 14px;
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .board-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .board-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-color: #2563eb;
      transform: translateY(-2px);
    }
    .board-card-title {
      font-size: 17px;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.3;
    }
    .board-card-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #64748b;
    }
    .board-card-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .board-card-date {
      font-size: 12px;
      color: #94a3b8;
    }
    .board-card.empty {
      border: 2px dashed #cbd5e1;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 14px;
      min-height: 100px;
      cursor: default;
    }

    /* Import section */
    .import-section {
      margin-top: 8px;
    }
    .import-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
      transition: background 0.15s, border-color 0.15s;
    }
    .import-label:hover { background: #f1f5f9; border-color: #94a3b8; }

    /* Template section */
    .template-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .template-card:hover { border-color: #cbd5e1; }
    .template-name { font-size: 14px; font-weight: 500; color: #334155; }
    .template-cols { font-size: 12px; color: #94a3b8; }
    .btn-small {
      padding: 5px 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-small:hover { background: #1d4ed8; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; }
      .topnav { background: #1e293b; border-color: #334155; }
      .topnav-logo { color: #60a5fa; }
      .nav-link { color: #94a3b8; }
      .nav-link:hover { background: #334155; }
      .nav-link.admin { color: #a78bfa; }
      .nav-link.admin:hover { background: #2d2150; }
      .btn-logout { background: #3b1c1c; color: #f87171; }
      .btn-logout:hover { background: #4c2020; }
      .page-header h1 { color: #e2e8f0; }
      .page-header p { color: #94a3b8; }
      .section-title { color: #94a3b8; }
      .create-bar input { background: #1e293b; color: #e2e8f0; border-color: #475569; }
      .create-bar input:focus { border-color: #2563eb; }
      .board-card { background: #1e293b; border-color: #334155; }
      .board-card:hover { border-color: #2563eb; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
      .board-card-title { color: #e2e8f0; }
      .board-card-stats { color: #94a3b8; }
      .board-card-date { color: #64748b; }
      .board-card.empty { border-color: #475569; color: #64748b; }
      .import-label { background: #1e293b; border-color: #475569; color: #94a3b8; }
      .import-label:hover { background: #334155; }
      .template-card { background: #1e293b; border-color: #334155; }
      .template-card:hover { border-color: #475569; }
      .template-name { color: #e2e8f0; }
    }
  </style>
</head>
<body>
  <!-- Top navigation -->
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-logo">Kanban</a>
    </div>
    <div class="topnav-right" id="navActions"></div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>Deine Boards</h1>
      <p>Erstelle und verwalte deine Kanban Boards.</p>
    </div>

    <!-- Create board -->
    <form id="createForm" class="create-bar">
      <label for="title" class="sr-only">Board-Name</label>
      <input type="text" id="title" placeholder="Neues Board erstellen..." autofocus>
      <button type="submit">+ Erstellen</button>
    </form>
    <div class="create-error" id="createError"></div>

    <!-- Board list -->
    <div id="boardSection"></div>

    <!-- Templates -->
    <div id="templateSection"></div>

    <!-- Import -->
    <div class="import-section">
      <label for="importFile" class="import-label">
        <span>&#128194; Board importieren (JSON)</span>
        <input type="file" id="importFile" accept=".json" hidden>
      </label>
    </div>
  </div>

  <script>
    let currentUser = null;

    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.authenticated) {
          currentUser = data.user;
          buildNav();
          return true;
        } else {
          window.location.href = '/login.html';
          return false;
        }
      } catch (err) {
        window.location.href = '/login.html';
        return false;
      }
    }

    function buildNav() {
      const nav = document.getElementById('navActions');
      nav.innerHTML = '';

      const settingsLink = document.createElement('a');
      settingsLink.href = '/settings.html';
      settingsLink.className = 'nav-link';
      settingsLink.textContent = currentUser.username;
      nav.appendChild(settingsLink);

      if (currentUser.is_admin) {
        const adminLink = document.createElement('a');
        adminLink.href = '/admin.html';
        adminLink.className = 'nav-link admin';
        adminLink.textContent = 'Admin';
        nav.appendChild(adminLink);
      }

      const logoutBtn = document.createElement('button');
      logoutBtn.className = 'btn-logout';
      logoutBtn.textContent = 'Abmelden';
      logoutBtn.onclick = async () => {
        await fetch('/api/auth/logout', { method: 'POST', headers: { 'X-Requested-With': 'kanban' } });
        window.location.reload();
      };
      nav.appendChild(logoutBtn);
    }

    checkAuth().then(authed => {
      if (!authed) return;
      loadBoards();
      loadTemplates();
    });

    // Create board
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('createError');
      errEl.style.display = 'none';
      const title = document.getElementById('title').value.trim() || 'Mein Board';
      const res = await fetch('/api/boards', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
        body: JSON.stringify({ title })
      });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        errEl.textContent = d.error || 'Board erstellen fehlgeschlagen';
        errEl.style.display = 'block';
        return;
      }
      const board = await res.json();
      window.location.href = '/board/' + board.id;
    });

    // Load boards
    async function loadBoards() {
      try {
        const res = await fetch('/api/boards');
        const boards = await res.json();
        const section = document.getElementById('boardSection');
        section.innerHTML = '';

        if (boards.length === 0) {
          const grid = document.createElement('div');
          grid.className = 'board-grid';
          const empty = document.createElement('div');
          empty.className = 'board-card empty';
          empty.textContent = 'Noch keine Boards vorhanden. Erstelle dein erstes Board!';
          grid.appendChild(empty);
          section.appendChild(grid);
          return;
        }

        const heading = document.createElement('div');
        heading.className = 'section-title';
        heading.textContent = boards.length + (boards.length === 1 ? ' Board' : ' Boards');
        section.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'board-grid';

        for (const board of boards) {
          const card = document.createElement('a');
          card.href = '/board/' + board.id;
          card.className = 'board-card';

          const title = document.createElement('div');
          title.className = 'board-card-title';
          title.textContent = board.title;
          card.appendChild(title);

          const stats = document.createElement('div');
          stats.className = 'board-card-stats';

          const colStat = document.createElement('span');
          colStat.className = 'board-card-stat';
          colStat.innerHTML = '&#9633; ' + (board.column_count || 0) + ' Spalten';
          stats.appendChild(colStat);

          const cardStat = document.createElement('span');
          cardStat.className = 'board-card-stat';
          cardStat.innerHTML = '&#9635; ' + (board.card_count || 0) + ' Karten';
          stats.appendChild(cardStat);

          card.appendChild(stats);

          const date = document.createElement('div');
          date.className = 'board-card-date';
          date.textContent = 'Erstellt am ' + new Date(board.created_at + 'Z').toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
          card.appendChild(date);

          grid.appendChild(card);
        }

        section.appendChild(grid);
      } catch (e) { console.error(e); }
    }

    // Load templates
    async function loadTemplates() {
      try {
        const res = await fetch('/api/templates');
        if (!res.ok) return;
        const templates = await res.json();
        if (templates.length === 0) return;

        const section = document.getElementById('templateSection');
        section.innerHTML = '';

        const heading = document.createElement('div');
        heading.className = 'section-title';
        heading.textContent = 'Vorlagen';
        section.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'board-grid';

        for (const t of templates) {
          const cols = JSON.parse(t.columns_json);
          const card = document.createElement('div');
          card.className = 'template-card';

          const info = document.createElement('div');
          const name = document.createElement('div');
          name.className = 'template-name';
          name.textContent = t.name;
          info.appendChild(name);
          const colInfo = document.createElement('div');
          colInfo.className = 'template-cols';
          colInfo.textContent = cols.length + ' Spalten';
          info.appendChild(colInfo);
          card.appendChild(info);

          const btn = document.createElement('button');
          btn.className = 'btn-small';
          btn.textContent = 'Verwenden';
          btn.onclick = async (e) => {
            e.stopPropagation();
            const title = prompt('Board-Name:', t.name);
            if (!title) return;
            const res = await fetch('/api/templates/' + t.id + '/create-board', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
              body: JSON.stringify({ title })
            });
            if (res.ok) {
              const board = await res.json();
              window.location.href = '/board/' + board.id;
            }
          };
          card.appendChild(btn);
          grid.appendChild(card);
        }
        section.appendChild(grid);
      } catch {}
    }

    // Import board
    document.getElementById('importFile').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const res = await fetch('/api/boards/import', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Import fehlgeschlagen');
        const board = await res.json();
        window.location.href = '/board/' + board.id;
      } catch (err) {
        alert('Import fehlgeschlagen: ' + err.message);
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW:', err));
    }
  </script>
  <script src="/pwa-install.js"></script>
</body>
</html>
