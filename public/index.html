<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <meta name="description" content="Einfaches selbst-gehostetes Kanban Board">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      color: #1e293b;
      margin-bottom: 8px;
    }
    p {
      color: #64748b;
      margin-bottom: 32px;
      font-size: 15px;
    }
    .form-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      outline: 2px solid transparent;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #2563eb; }
    button {
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #1d4ed8; }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#9633;&#9633;&#9633;</div>
    <h1>Kanban Board</h1>
    <p>Erstelle ein neues Board und teile den Link mit deinem Team.</p>
    <form id="createForm">
      <div class="form-group">
        <label for="title" class="sr-only">Board-Name</label>
        <input type="text" id="title" placeholder="Board-Name..." autofocus>
        <button type="submit">Erstellen</button>
      </div>
    </form>
  </div>
  <script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim() || 'Mein Board';
      const res = await fetch('/api/boards', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      const board = await res.json();
      window.location.href = '/board/' + board.id;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW:', err));
    }
  </script>
</body>
</html>
