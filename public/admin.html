<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Kanban Board</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* Top nav */
    .topnav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav-left { display: flex; align-items: center; gap: 12px; }
    .topnav-logo { font-size: 22px; font-weight: 700; color: #2563eb; text-decoration: none; }
    .topnav-right { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      padding: 6px 14px; border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 500; color: #475569; transition: background 0.15s;
    }
    .nav-link:hover { background: #f1f5f9; }
    .nav-link.active { background: #f5f3ff; color: #7c3aed; }
    .btn-logout {
      padding: 6px 14px; background: #fee2e2; color: #dc2626; border: none;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .btn-logout:hover { background: #fecaca; }

    /* Main */
    .main { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; color: #1e293b; margin-bottom: 6px; }
    .page-header p { color: #64748b; font-size: 14px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid #e2e8f0;
      margin-bottom: 24px;
    }
    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }
    .tab:hover { color: #334155; }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .admin-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .admin-card h2 { font-size: 18px; color: #1e293b; margin-bottom: 16px; }
    .admin-card h3 { font-size: 14px; color: #475569; margin-top: 20px; margin-bottom: 10px; }

    /* User list */
    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .user-row:last-child { border-bottom: none; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #eff6ff; color: #2563eb; display: flex; align-items: center;
      justify-content: center; font-weight: 600; font-size: 13px;
    }
    .user-name { font-size: 14px; font-weight: 500; color: #1e293b; }
    .user-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      font-weight: 600; margin-left: 6px;
    }
    .user-badge.admin { background: #f5f3ff; color: #7c3aed; }
    .user-badge.user { background: #f1f5f9; color: #64748b; }

    /* Form elements */
    .form-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .form-input {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      flex: 1;
      min-width: 120px;
      outline: none;
    }
    .form-input:focus { border-color: #2563eb; }
    .form-select {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      cursor: pointer;
      outline: none;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #475569;
      cursor: pointer;
    }
    .btn-primary {
      padding: 8px 18px; background: #2563eb; color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger {
      padding: 5px 12px; background: #fee2e2; color: #dc2626; border: none;
      border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .btn-danger:hover { background: #fecaca; }
    .form-error {
      display: none; color: #dc2626; font-size: 13px; margin-top: 8px;
    }
    .form-success {
      display: none; color: #16a34a; font-size: 13px; margin-top: 8px;
    }

    /* Board access */
    .board-access-item {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .board-access-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .board-access-header strong { font-size: 15px; color: #1e293b; }
    .board-access-members { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
    .member-tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 3px 10px; font-size: 12px;
    }
    .member-remove {
      background: none; border: none; color: #64748b; cursor: pointer;
      padding: 0 2px; font-size: 14px; line-height: 1;
    }
    .member-remove:hover { color: #dc2626; }

    /* Board download */
    .board-download-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .board-download-item:last-child { border-bottom: none; }
    .board-download-info { font-size: 14px; color: #1e293b; font-weight: 500; }
    .board-download-meta { font-size: 12px; color: #94a3b8; }
    .btn-download {
      padding: 6px 14px; background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;
      border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer;
    }
    .btn-download:hover { background: #dcfce7; }
    .btn-download-all {
      padding: 8px 18px; background: #16a34a; color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-download-all:hover { background: #15803d; }

    /* Empty state */
    .empty-state { color: #94a3b8; font-size: 13px; padding: 12px 0; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; }
      .topnav { background: #1e293b; border-color: #334155; }
      .topnav-logo { color: #60a5fa; }
      .nav-link { color: #94a3b8; }
      .nav-link:hover { background: #334155; }
      .nav-link.active { background: #2d2150; color: #a78bfa; }
      .btn-logout { background: #3b1c1c; color: #f87171; }
      .page-header h1 { color: #e2e8f0; }
      .page-header p { color: #94a3b8; }
      .tabs { border-color: #334155; }
      .tab { color: #94a3b8; }
      .tab:hover { color: #e2e8f0; }
      .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
      .admin-card { background: #1e293b; border-color: #334155; }
      .admin-card h2 { color: #e2e8f0; }
      .admin-card h3 { color: #94a3b8; }
      .user-row { border-color: #334155; }
      .user-avatar { background: #1e3a5f; color: #60a5fa; }
      .user-name { color: #e2e8f0; }
      .user-badge.admin { background: #2d2150; color: #a78bfa; }
      .user-badge.user { background: #334155; color: #94a3b8; }
      .form-input { background: #334155; color: #e2e8f0; border-color: #475569; }
      .form-input:focus { border-color: #2563eb; }
      .form-select { background: #334155; color: #e2e8f0; border-color: #475569; }
      .board-access-item { border-color: #334155; }
      .board-access-header strong { color: #e2e8f0; }
      .member-tag { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
      .board-download-item { border-color: #334155; }
      .board-download-info { color: #e2e8f0; }
      .btn-download { background: #0a2e1a; color: #4ade80; border-color: #166534; }
      .btn-download:hover { background: #14532d; }
      .btn-danger { background: #3b1c1c; color: #f87171; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-logo">Kanban</a>
    </div>
    <div class="topnav-right">
      <a href="/" class="nav-link">Boards</a>
      <a href="/settings.html" class="nav-link" id="navUser"></a>
      <a href="/admin.html" class="nav-link active">Admin</a>
      <button class="btn-logout" id="logoutBtn">Abmelden</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>Administration</h1>
      <p>Benutzer, Board-Zugriff und Daten verwalten.</p>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="users">Benutzer</button>
      <button class="tab" data-tab="access">Board-Zugriff</button>
      <button class="tab" data-tab="export">Daten & Export</button>
    </div>

    <!-- Users tab -->
    <div class="tab-panel active" id="tab-users">
      <div class="admin-card">
        <h2>Benutzerverwaltung</h2>
        <div id="userList"></div>

        <h3>Neuer Benutzer</h3>
        <div class="form-row">
          <input type="text" class="form-input" id="newUsername" placeholder="Benutzername" required>
          <input type="password" class="form-input" id="newUserPassword" placeholder="Passwort (min. 6)" required>
          <label class="checkbox-label"><input type="checkbox" id="newUserAdmin"> Admin</label>
          <button class="btn-primary" id="addUserBtn">Erstellen</button>
        </div>
        <div class="form-error" id="addUserError"></div>
        <div class="form-success" id="addUserSuccess"></div>
      </div>
    </div>

    <!-- Board access tab -->
    <div class="tab-panel" id="tab-access">
      <div class="admin-card">
        <h2>Board-Zugriff</h2>
        <p style="color:#64748b;font-size:13px;margin-bottom:16px;">
          Verwalte, welche Benutzer auf welche Boards zugreifen. Admins haben immer Zugriff.
        </p>
        <div id="boardAccessList"></div>
      </div>
    </div>

    <!-- Export tab -->
    <div class="tab-panel" id="tab-export">
      <div class="admin-card">
        <h2>Board-Daten exportieren</h2>
        <p style="color:#64748b;font-size:13px;margin-bottom:16px;">
          Lade einzelne Boards oder alle Daten als JSON herunter.
        </p>
        <div style="margin-bottom:16px;">
          <button class="btn-download-all" id="downloadAllBtn">Alle Boards herunterladen</button>
        </div>
        <div id="boardDownloadList"></div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    // --- Auth & Init ---
    async function init() {
      try {
        const data = await fetch('/api/auth/status').then(r => r.json());
        if (!data.authenticated) { window.location.href = '/login.html'; return; }
        currentUser = data.user;
        if (!currentUser.is_admin) { window.location.href = '/'; return; }
        document.getElementById('navUser').textContent = currentUser.username;
        loadUsers();
        loadBoardAccess();
        loadBoardDownloads();
      } catch { window.location.href = '/login.html'; }
    }

    // --- Tabs ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // --- Users ---
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const users = await res.json();
      const list = document.getElementById('userList');
      list.innerHTML = '';

      if (users.length === 0) {
        list.innerHTML = '<div class="empty-state">Keine Benutzer vorhanden.</div>';
        return;
      }

      for (const user of users) {
        const row = document.createElement('div');
        row.className = 'user-row';

        const info = document.createElement('div');
        info.className = 'user-info';
        const avatar = document.createElement('div');
        avatar.className = 'user-avatar';
        avatar.textContent = user.username.charAt(0).toUpperCase();
        info.appendChild(avatar);

        const nameEl = document.createElement('span');
        nameEl.className = 'user-name';
        nameEl.textContent = user.username;
        info.appendChild(nameEl);

        const badge = document.createElement('span');
        badge.className = 'user-badge ' + (user.is_admin ? 'admin' : 'user');
        badge.textContent = user.is_admin ? 'Admin' : 'Benutzer';
        info.appendChild(badge);

        row.appendChild(info);

        if (user.id !== currentUser.id) {
          const del = document.createElement('button');
          del.className = 'btn-danger';
          del.textContent = 'Entfernen';
          del.onclick = async () => {
            if (!confirm('Benutzer "' + user.username + '" wirklich entfernen?')) return;
            await fetch('/api/admin/users/' + user.id, {
              method: 'DELETE', headers: { 'X-Requested-With': 'kanban' }
            });
            loadUsers();
          };
          row.appendChild(del);
        }

        list.appendChild(row);
      }
    }

    document.getElementById('addUserBtn').addEventListener('click', async () => {
      const errEl = document.getElementById('addUserError');
      const okEl = document.getElementById('addUserSuccess');
      errEl.style.display = 'none';
      okEl.style.display = 'none';

      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newUserPassword').value;
      const isAdmin = document.getElementById('newUserAdmin').checked;

      if (!username || !password) { errEl.textContent = 'Benutzername und Passwort erforderlich.'; errEl.style.display = 'block'; return; }

      const res = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
        body: JSON.stringify({ username, password, is_admin: isAdmin })
      });
      if (res.ok) {
        document.getElementById('newUsername').value = '';
        document.getElementById('newUserPassword').value = '';
        document.getElementById('newUserAdmin').checked = false;
        okEl.textContent = 'Benutzer "' + username + '" erstellt!';
        okEl.style.display = 'block';
        setTimeout(() => okEl.style.display = 'none', 3000);
        loadUsers();
      } else {
        const d = await res.json();
        errEl.textContent = d.error || 'Fehler beim Erstellen.';
        errEl.style.display = 'block';
      }
    });

    // --- Board Access ---
    async function loadBoardAccess() {
      const [boardsRes, usersRes] = await Promise.all([
        fetch('/api/boards'),
        fetch('/api/admin/users')
      ]);
      const boards = await boardsRes.json();
      const allUsers = await usersRes.json();
      const nonAdminUsers = allUsers.filter(u => !u.is_admin);
      const container = document.getElementById('boardAccessList');
      container.innerHTML = '';

      if (boards.length === 0) {
        container.innerHTML = '<div class="empty-state">Keine Boards vorhanden.</div>';
        return;
      }

      for (const board of boards) {
        const item = document.createElement('div');
        item.className = 'board-access-item';

        const header = document.createElement('div');
        header.className = 'board-access-header';
        const titleEl = document.createElement('strong');
        titleEl.textContent = board.title;
        header.appendChild(titleEl);
        item.appendChild(header);

        const membersDiv = document.createElement('div');
        membersDiv.className = 'board-access-members';
        membersDiv.id = 'members-' + board.id;
        item.appendChild(membersDiv);

        if (nonAdminUsers.length > 0) {
          const addRow = document.createElement('div');
          addRow.style.cssText = 'display:flex;gap:8px;margin-top:10px;';
          const sel = document.createElement('select');
          sel.className = 'form-select';
          sel.style.flex = '1';
          sel.innerHTML = '<option value="">+ Benutzer hinzufuegen...</option>';
          for (const u of nonAdminUsers) {
            const opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = u.username;
            sel.appendChild(opt);
          }
          const addBtn = document.createElement('button');
          addBtn.className = 'btn-primary';
          addBtn.textContent = 'Hinzufuegen';
          addBtn.onclick = async () => {
            if (!sel.value) return;
            await fetch('/api/boards/' + board.id + '/members', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
              body: JSON.stringify({ user_id: parseInt(sel.value) })
            });
            sel.value = '';
            renderMembers(board.id, membersDiv);
          };
          addRow.appendChild(sel);
          addRow.appendChild(addBtn);
          item.appendChild(addRow);
        }

        container.appendChild(item);
        renderMembers(board.id, membersDiv);
      }
    }

    async function renderMembers(boardId, container) {
      const res = await fetch('/api/boards/' + boardId + '/members');
      const members = await res.json();
      const nonAdminMembers = members.filter(m => !m.is_admin);
      container.innerHTML = '';
      if (nonAdminMembers.length === 0) {
        container.innerHTML = '<span class="empty-state">Nur Admins</span>';
        return;
      }
      for (const member of nonAdminMembers) {
        const tag = document.createElement('span');
        tag.className = 'member-tag';
        const nameSpan = document.createElement('span');
        nameSpan.textContent = member.username;
        tag.appendChild(nameSpan);
        const removeBtn = document.createElement('button');
        removeBtn.className = 'member-remove';
        removeBtn.innerHTML = '&times;';
        removeBtn.title = 'Entfernen';
        removeBtn.onclick = async () => {
          await fetch('/api/boards/' + boardId + '/members/' + member.id, {
            method: 'DELETE', headers: { 'X-Requested-With': 'kanban' }
          });
          renderMembers(boardId, container);
        };
        tag.appendChild(removeBtn);
        container.appendChild(tag);
      }
    }

    // --- Board Downloads ---
    async function loadBoardDownloads() {
      const res = await fetch('/api/boards');
      const boards = await res.json();
      const list = document.getElementById('boardDownloadList');
      list.innerHTML = '';

      if (boards.length === 0) {
        list.innerHTML = '<div class="empty-state">Keine Boards vorhanden.</div>';
        return;
      }

      for (const board of boards) {
        const row = document.createElement('div');
        row.className = 'board-download-item';

        const info = document.createElement('div');
        const nameEl = document.createElement('div');
        nameEl.className = 'board-download-info';
        nameEl.textContent = board.title;
        info.appendChild(nameEl);
        const meta = document.createElement('div');
        meta.className = 'board-download-meta';
        meta.textContent = (board.column_count || 0) + ' Spalten, ' + (board.card_count || 0) + ' Karten';
        info.appendChild(meta);
        row.appendChild(info);

        const btn = document.createElement('button');
        btn.className = 'btn-download';
        btn.textContent = 'Herunterladen';
        btn.onclick = () => downloadBoard(board.id, board.title);
        row.appendChild(btn);

        list.appendChild(row);
      }
    }

    async function downloadBoard(boardId, title) {
      try {
        const res = await fetch('/api/boards/' + boardId + '/export');
        if (!res.ok) throw new Error('Export fehlgeschlagen');
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (title || 'board') + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) { alert('Download fehlgeschlagen: ' + e.message); }
    }

    document.getElementById('downloadAllBtn').addEventListener('click', async () => {
      try {
        const res = await fetch('/api/boards');
        const boards = await res.json();
        const allData = [];
        for (const board of boards) {
          const expRes = await fetch('/api/boards/' + board.id + '/export');
          if (expRes.ok) allData.push(await expRes.json());
        }
        const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kanban-backup-' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) { alert('Backup fehlgeschlagen: ' + e.message); }
    });

    // --- Logout ---
    document.getElementById('logoutBtn').onclick = async () => {
      await fetch('/api/auth/logout', { method: 'POST', headers: { 'X-Requested-With': 'kanban' } });
      window.location.href = '/login.html';
    };

    init();
  </script>
</body>
</html>
