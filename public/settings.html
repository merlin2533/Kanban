<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen - Kanban Board</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* Top nav */
    .topnav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topnav-left { display: flex; align-items: center; gap: 12px; }
    .topnav-logo { font-size: 22px; font-weight: 700; color: #2563eb; text-decoration: none; }
    .topnav-right { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      padding: 6px 14px; border-radius: 8px; text-decoration: none;
      font-size: 13px; font-weight: 500; color: #475569; transition: background 0.15s;
    }
    .nav-link:hover { background: #f1f5f9; }
    .nav-link.active { background: #f1f5f9; color: #1e293b; }
    .nav-link.admin { color: #7c3aed; }
    .nav-link.admin:hover { background: #f5f3ff; }
    .btn-logout {
      padding: 6px 14px; background: #fee2e2; color: #dc2626; border: none;
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    }
    .btn-logout:hover { background: #fecaca; }

    /* Main */
    .main { max-width: 520px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; color: #1e293b; margin-bottom: 6px; }
    .page-header p { color: #64748b; font-size: 14px; }

    /* Card */
    .settings-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .settings-card h2 { font-size: 18px; color: #1e293b; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 4px; }
    .form-group input {
      width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    .form-group input:focus { border-color: #2563eb; }
    .btn-primary {
      padding: 10px 22px; background: #2563eb; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .pw-status {
      font-size: 13px; margin-bottom: 16px; padding: 8px 12px;
      border-radius: 6px; background: #f8fafc;
    }
    .pw-status.warn { background: #fef2f2; color: #dc2626; }
    .pw-status.ok { background: #f0fdf4; color: #16a34a; }
    #pwResult { margin-top: 12px; font-size: 13px; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; }
      .topnav { background: #1e293b; border-color: #334155; }
      .topnav-logo { color: #60a5fa; }
      .nav-link { color: #94a3b8; }
      .nav-link:hover { background: #334155; }
      .nav-link.active { background: #334155; color: #e2e8f0; }
      .nav-link.admin { color: #a78bfa; }
      .nav-link.admin:hover { background: #2d2150; }
      .btn-logout { background: #3b1c1c; color: #f87171; }
      .page-header h1 { color: #e2e8f0; }
      .page-header p { color: #94a3b8; }
      .settings-card { background: #1e293b; border-color: #334155; }
      .settings-card h2 { color: #e2e8f0; }
      .form-group label { color: #94a3b8; }
      .form-group input { background: #334155; color: #e2e8f0; border-color: #475569; }
      .form-group input:focus { border-color: #2563eb; }
      .pw-status { background: #334155; color: #94a3b8; }
      .pw-status.warn { background: #3b1c1c; color: #f87171; }
      .pw-status.ok { background: #0a2e1a; color: #4ade80; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" class="topnav-logo">Kanban</a>
    </div>
    <div class="topnav-right" id="navActions">
      <a href="/" class="nav-link">Boards</a>
      <a href="/settings.html" class="nav-link active" id="navUser">Einstellungen</a>
      <button class="btn-logout" id="logoutBtn">Abmelden</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-header">
      <h1>Einstellungen</h1>
      <p>Dein Profil und Passwort verwalten.</p>
    </div>

    <div class="settings-card">
      <h2>Passwort aendern</h2>
      <div class="pw-status" id="passwordAge"></div>
      <form id="passwordForm">
        <div class="form-group">
          <label for="currentPassword">Aktuelles Passwort</label>
          <input type="password" id="currentPassword" required>
        </div>
        <div class="form-group">
          <label for="newPassword">Neues Passwort (min. 6 Zeichen)</label>
          <input type="password" id="newPassword" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Passwort bestaetigen</label>
          <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn-primary">Passwort aendern</button>
        <div id="pwResult"></div>
      </form>
    </div>
  </div>

  <script>
    let currentUser = null;

    async function init() {
      try {
        const data = await fetch('/api/auth/status').then(r => r.json());
        if (!data.authenticated) { window.location.href = '/login.html'; return; }
        currentUser = data.user;
        document.getElementById('navUser').textContent = currentUser.username;

        // Admin link
        if (currentUser.is_admin) {
          const adminLink = document.createElement('a');
          adminLink.href = '/admin.html';
          adminLink.className = 'nav-link admin';
          adminLink.textContent = 'Admin';
          const nav = document.getElementById('navActions');
          nav.insertBefore(adminLink, document.getElementById('logoutBtn'));
        }

        // Password age
        const pwAge = document.getElementById('passwordAge');
        if (data.passwordReminder) {
          pwAge.textContent = 'Dein Passwort sollte geaendert werden (aelter als 14 Tage).';
          pwAge.classList.add('warn');
        } else {
          pwAge.textContent = 'Passwort ist aktuell.';
          pwAge.classList.add('ok');
        }
      } catch { window.location.href = '/login.html'; }
    }

    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const result = document.getElementById('pwResult');
      const newPw = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmPassword').value;
      if (newPw !== confirmPw) {
        result.textContent = 'Passwoerter stimmen nicht ueberein.';
        result.style.color = '#dc2626';
        return;
      }
      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'kanban' },
        body: JSON.stringify({ currentPassword: document.getElementById('currentPassword').value, newPassword: newPw })
      });
      const data = await res.json();
      if (res.ok) {
        result.textContent = 'Passwort erfolgreich geaendert!';
        result.style.color = '#16a34a';
        document.getElementById('passwordForm').reset();
        document.getElementById('passwordAge').textContent = 'Passwort ist aktuell.';
        document.getElementById('passwordAge').className = 'pw-status ok';
      } else {
        result.textContent = data.error;
        result.style.color = '#dc2626';
      }
    });

    document.getElementById('logoutBtn').onclick = async () => {
      await fetch('/api/auth/logout', { method: 'POST', headers: { 'X-Requested-With': 'kanban' } });
      window.location.href = '/login.html';
    };

    init();
  </script>
</body>
</html>
