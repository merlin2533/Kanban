services:
  kanban:
    image: ${IMAGE:-merlin2533/kanban:latest}
    build: .
    container_name: kanban
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - kanban-data:/data
      - kanban-uploads:/app/uploads
    environment:
      - PORT=3000
      - DB_PATH=/data/kanban.db
      - NODE_ENV=production
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  kanban-data:
  kanban-uploads:
