# Docker Swarm Stack - Deploy with:
#   docker stack deploy -c docker-stack.yml kanban
#
# Configure via environment or .env file before deploy

services:
  resqioticket_DB:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resqioticket}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - resqioticket_db_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
    networks:
      - kanban-net

  sgit_ticket:
    image: ${SGIT_TICKET_IMAGE:-merlin2539/sgit_ticket:latest}
    ports:
      - target: 3000
        published: ${SGIT_TICKET_PORT:-3200}
        protocol: tcp
        mode: ingress
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@resqioticket_DB:5432/resqioticket}
      - BASE_URL=${BASE_URL:-http://localhost:3200}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-support@yourdomain.com}
      - API_KEY=${API_KEY:-}
      - INBOUND_WEBHOOK_SECRET=${INBOUND_WEBHOOK_SECRET:-}
      - REMINDER_INTERVAL_HOURS=${REMINDER_INTERVAL_HOURS:-24}
      - REMINDER_ESCALATION_DAYS=${REMINDER_ESCALATION_DAYS:-3}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - kanban-net

  app:
    image: ${IMAGE:-merlin2539/kanban:latest}
    ports:
      - target: 3000
        published: ${PORT:-3200}
        protocol: tcp
        mode: ingress
    volumes:
      - kanban-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@resqioticket_DB:5432/resqioticket}
      - BASE_URL=${APP_URL:-http://localhost:3200}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-support@yourdomain.com}
      - API_KEY=${API_KEY:-default-dev-api-key}
      - INBOUND_WEBHOOK_SECRET=${INBOUND_WEBHOOK_SECRET:-}
      - CRON_SECRET=${CRON_SECRET:-default-cron-secret}
      - REMINDER_INTERVAL_HOURS=${REMINDER_INTERVAL_HOURS:-24}
      - REMINDER_ESCALATION_DAYS=${REMINDER_ESCALATION_DAYS:-3}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
      placement:
        constraints:
          - node.role == manager
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kanban-net

networks:
  kanban-net:
    driver: overlay

volumes:
  resqioticket_db_postgres_data:
    driver: local
  kanban-uploads:
    driver: local
